syntax = "proto3";

package khronos;

service ScheduleService {
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
}

service WorkflowService {
  rpc StartWorkflow(StartWorkflowRequest) returns (StartWorkflowResponse);
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse);
}

service WorkerService {
  rpc PollActivity(PollActivityRequest) returns (PollActivityResponse);
  rpc ReportActivityResult(ReportActivityResultRequest) returns (ReportActivityResultResponse);
  rpc ReportActivityFailure(ReportActivityFailureRequest) returns (ReportActivityFailureResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message ScheduleSpec {
  string spec_type = 1; // "cron" or "interval"
  repeated string cron_expressions = 2;
  IntervalSpec interval_spec = 3;
}

message IntervalSpec {
  uint64 seconds = 1;
}

message OverlapPolicy {
  string policy = 1; // "skip", "buffer", "terminate"
}

message WorkflowAction {
  string workflow_name = 1;
  map<string, string> args = 2;
  string task_queue = 3;
  string id = 4;
  Timeouts timeouts = 5;
}

message Timeouts {
  uint64 execution_timeout_secs = 1;
  uint64 run_timeout_secs = 2;
  uint64 task_timeout_secs = 3;
}

message CreateScheduleRequest {
  string schedule_id = 1;
  string namespace = 2;
  ScheduleSpec spec = 3;
  WorkflowAction action = 4;
  OverlapPolicy policy = 5;
}

message CreateScheduleResponse { string schedule_id = 1; }
message UpdateScheduleRequest { string schedule_id = 1; string namespace = 2; ScheduleSpec spec = 3; }
message UpdateScheduleResponse { bool success = 1; }
message DeleteScheduleRequest { string schedule_id = 1; string namespace = 2; }
message DeleteScheduleResponse { bool success = 1; }

message ListSchedulesRequest { string namespace = 1; }
message ScheduleInfo {
  string schedule_id = 1;
  string namespace = 2;
  ScheduleSpec spec = 3;
  WorkflowAction action = 4;
  OverlapPolicy policy = 5;
  string created_at = 6;
}
message ListSchedulesResponse { repeated ScheduleInfo schedules = 1; }

message StartWorkflowRequest {
  string workflow_name = 1;
  map<string, string> args = 2;
  string workflow_id = 3;
  string task_queue = 4;
  Timeouts timeouts = 5;
  string namespace = 6;
}
message StartWorkflowResponse { string workflow_run_id = 1; }

message GetWorkflowRequest { string workflow_run_id = 1; string namespace = 2; }
message WorkflowInfo {
  string workflow_run_id = 1;
  string workflow_id = 2;
  string name = 3;
  string state = 4; // pending, running, completed, failed, cancelled
  map<string, string> args = 5;
  string result_json = 6;
  string started_at = 7;
  string completed_at = 8;
}
message GetWorkflowResponse { WorkflowInfo info = 1; }

message ListWorkflowsRequest { string namespace = 1; }
message ListWorkflowsResponse { repeated WorkflowInfo workflows = 1; }

message CancelWorkflowRequest { string workflow_run_id = 1; string namespace = 2; }
message CancelWorkflowResponse { bool success = 1; }

message RetryPolicy {
  uint32 maximum_attempts = 1;
  double initial_interval_secs = 2;
}

message ActivityTask {
  string activity_id = 1;
  string step_id = 2;
  string workflow_run_id = 3;
  string name = 4;
  map<string, string> args = 5;
  RetryPolicy retry_policy = 6;
  uint64 heartbeat_timeout_secs = 7;
  uint64 start_to_close_timeout_secs = 8;
}

message PollActivityRequest { string task_queue = 1; repeated string activity_types = 2; }
message PollActivityResponse { ActivityTask task = 1; bool has_task = 2; }

message ReportActivityResultRequest {
  string activity_id = 1;
  string result_json = 2;
}
message ReportActivityResultResponse { bool success = 1; }

message ReportActivityFailureRequest {
  string activity_id = 1;
  string error_message = 2;
}
message ReportActivityFailureResponse { bool success = 1; }

message HeartbeatRequest { string activity_id = 1; }
message HeartbeatResponse { bool success = 1; }
